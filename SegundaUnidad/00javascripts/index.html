<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Básica</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .calculadora { border: 1px solid #ccc; padding: 20px; width: 300px; }
        input { width: 100%; margin-bottom: 10px; padding: 5px; }
        button { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="calculadora">
        <h3>Calculadora JS</h3>
        <input type="number" id="num1" placeholder="Número 1">
        <input type="number" id="num2" placeholder="Número 2">
        
        <div>
            <button onclick="calcular('+')">+</button>
            <button onclick="calcular('-')">-</button>
            <button onclick="calcular('*')">*</button>
            <button onclick="calcular('/')">/</button>
        </div>
        
        <h3 id="resultado">Resultado: -</h3>
    </div>

    <script>
        function calcular(operacion) {
            // 1. Obtener valores de los inputs y convertirlos a números (parseFloat)
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            const pantalla = document.getElementById('resultado');

            // 2. Validación: Verificar que sean números reales
            if (isNaN(n1) || isNaN(n2)) {
                pantalla.innerText = "Error: Ingresa números válidos";
                return;
            }

            let resultado = 0;

            // 3. Estructura condicional (Switch) para definir la operación
            switch (operacion) {
                case '+': resultado = n1 + n2; break;
                case '-': resultado = n1 - n2; break;
                case '*': resultado = n1 * n2; break;
                case '/': 
                    // Validación lógica para evitar división por cero
                    resultado = (n2 !== 0) ? (n1 / n2) : "Error: Div por 0"; 
                    break;
            }

            // 4. Mostrar en pantalla
            pantalla.innerText = "Resultado: " + resultado;
        }
    </script>
</body>
</html>
